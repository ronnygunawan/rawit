plugins {
    id 'java'
}

group = 'com.example'
version = '1.0-SNAPSHOT'
sourceCompatibility = '17'

repositories {
    mavenLocal()
    mavenCentral()
}

dependencies {
    annotationProcessor 'io.github.ronnygunawan:rawit:1.0-SNAPSHOT'
    compileOnly 'io.github.ronnygunawan:rawit:1.0-SNAPSHOT'

    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.4'
}

compileJava {
    options.compilerArgs += ['-proc:none']
}

task processAnnotations(type: JavaCompile) {
    source = sourceSets.main.java
    classpath = sourceSets.main.compileClasspath
    destinationDirectory = sourceSets.main.java.classesDirectory
    options.annotationProcessorPath = configurations.annotationProcessor
    dependsOn compileJava
}

task reinjectBytecode(type: JavaCompile) {
    source = sourceSets.main.java
    classpath = sourceSets.main.compileClasspath
    destinationDirectory = sourceSets.main.java.classesDirectory
    options.compilerArgs += ['-proc:only']
    options.annotationProcessorPath = configurations.annotationProcessor
    options.incremental = false
    dependsOn processAnnotations
}

classes.dependsOn reinjectBytecode

test {
    useJUnitPlatform()
}
